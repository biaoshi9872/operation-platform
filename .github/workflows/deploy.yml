name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: operation-platform

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build --platform linux/amd64 -t "$IMAGE_NAME:latest" .

      - name: Export image
        run: |
          docker save "$IMAGE_NAME:latest" | gzip -1 > operation-platform.tar.gz
          sha256sum operation-platform.tar.gz > operation-platform.tar.gz.sha256

      - name: Install SSH password helper
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Validate secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          WORKLOAD_HOST: ${{ secrets.WORKLOAD_HOST }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_PORT"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_PASSWORD"
          test -n "$WORKLOAD_HOST"

      - name: Upload deploy files
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          WORKLOAD_HOST: ${{ secrets.WORKLOAD_HOST }}
        run: |
          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "mkdir -p /opt/k8s/manifests/operation-platform"
          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$DEPLOY_PORT" "$DEPLOY_USER@$WORKLOAD_HOST" "mkdir -p /opt/k8s/images/operation-platform"
          sshpass -p "$DEPLOY_PASSWORD" scp -o StrictHostKeyChecking=no -P "$DEPLOY_PORT" operation-platform.tar.gz "$DEPLOY_USER@$WORKLOAD_HOST:/opt/k8s/images/operation-platform/"
          sshpass -p "$DEPLOY_PASSWORD" scp -o StrictHostKeyChecking=no -P "$DEPLOY_PORT" operation-platform.tar.gz.sha256 "$DEPLOY_USER@$WORKLOAD_HOST:/opt/k8s/images/operation-platform/"
          sshpass -p "$DEPLOY_PASSWORD" scp -o StrictHostKeyChecking=no -P "$DEPLOY_PORT" operation-platform.tar.gz "$DEPLOY_USER@$DEPLOY_HOST:/opt/k8s/manifests/operation-platform/"
          sshpass -p "$DEPLOY_PASSWORD" scp -o StrictHostKeyChecking=no -P "$DEPLOY_PORT" operation-platform.tar.gz.sha256 "$DEPLOY_USER@$DEPLOY_HOST:/opt/k8s/manifests/operation-platform/"
          sshpass -p "$DEPLOY_PASSWORD" scp -o StrictHostKeyChecking=no -P "$DEPLOY_PORT" deploy/k8s/*.yaml "$DEPLOY_USER@$DEPLOY_HOST:/opt/k8s/manifests/operation-platform/"

      - name: Deploy to k3s
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          WORKLOAD_HOST: ${{ secrets.WORKLOAD_HOST }}
        run: |
          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$DEPLOY_PORT" "$DEPLOY_USER@$WORKLOAD_HOST" "\
            set -e; \
            cd /opt/k8s/images/operation-platform; \
            sha256sum -c operation-platform.tar.gz.sha256; \
            rm -f operation-platform.tar; \
            gunzip -c operation-platform.tar.gz > operation-platform.tar; \
            /usr/local/bin/k3s ctr images import /opt/k8s/images/operation-platform/operation-platform.tar; \
          "
          sshpass -p "$DEPLOY_PASSWORD" ssh -o StrictHostKeyChecking=no -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "\
            set -e; \
            kubectl apply -f /opt/k8s/manifests/operation-platform/namespace.yaml; \
            kubectl apply -f /opt/k8s/manifests/operation-platform/deployment.yaml; \
            kubectl apply -f /opt/k8s/manifests/operation-platform/service.yaml; \
            kubectl apply -f /opt/k8s/manifests/operation-platform/nodeport.yaml; \
            kubectl -n apps rollout status deploy/operation-platform --timeout=180s; \
            kubectl -n apps get pods -o wide; \
          "
