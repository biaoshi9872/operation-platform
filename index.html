<!DOCTYPE html>
<html lang="zh-cmn-Hans">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="/iconfont/iconfont.css" />
    <style>
      @keyframes spin {
        from {
          transform: rotate(0);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .spinning-ring,
      .spinning-s {
        position: absolute;
        width: 200px;
        height: 200px;
        left: 50%;
        top: 50%;
        margin: -100px 0 0 -100px;
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
      }

      .spinning-s {
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .spinning-img {
        background-image: url('@/assets/images/login/run1.png');
        width: 60px;
        height: 74px;
      }
      .spinning-ring {
        background-image: url('@/assets/images/login/run.png');
        animation-name: spin;
        animation-duration: 1.5s;
        animation-iteration-count: infinite;
        animation-timing-function: linear;
      }

      .loading-screen {
        position: fixed;
        left: 0;
        top: 0;
        right: 0;
        bottom: 0;
        background: #fff;
        z-index: 99999;
      }
    </style>

        s.parentNode.insertBefore(hm, s)
      })()
    </script>
  </head>
  <body>
    <div id="app">
      <div id="loading-screen" class="loading-screen">
        <div class="spinning-ring"></div>
        <div class="spinning-s">
          <div class="spinning-img"></div>
        </div>
      </div>
    </div>

    <script type="module" src="./load.min.js"></script>
  </body>
</html>
