server {
  listen 80;
  server_name _;

  resolver 10.43.0.10 valid=10s ipv6=off;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    return 302 /api_platform/;
  }

  location /api_platform/ {
    try_files $uri $uri/ /api_platform/index.html;
  }

  location /open-platform/ {
    set $config_service operation-platform-config-service.apps.svc.cluster.local:3000;
    proxy_pass http://$config_service;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /transfer-v2/ {
    set $config_service operation-platform-config-service.apps.svc.cluster.local:3000;
    proxy_pass http://$config_service;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /assets/ {
    set $config_service operation-platform-config-service.apps.svc.cluster.local:3000;
    proxy_pass http://$config_service;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
